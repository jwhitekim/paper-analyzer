<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Analyzer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sidebar-bg: #1a1a2e;
      --sidebar-text: #e8ecf0;
      --sidebar-muted: #8a95a8;
      --sidebar-dim: #cdd5e0;
      --sidebar-border: rgba(255, 255, 255, 0.08);
      --main-bg: #f4f6f9;
      --main-text: #222;
      --main-muted: #8a95a8;
      --main-border: #e8ecf0;
      --accent: #4a6cf7;
      --header-h: 72px;
      --sidebar-w: 320px;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--main-bg);
      color: var(--main-text);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    /* ====================================================
       HEADER
       ==================================================== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--sidebar-bg);
      color: #fff;
      height: var(--header-h);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .provider-badge {
      font-size: .72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .provider-gemini { background: #1e7e34; color: #fff; }
    .provider-claude { background: #d97706; color: #fff; }

    .header-search {
      flex: 1;
      display: flex;
      gap: 10px;
      max-width: 720px;
      margin-left: auto;
    }

    .header-search input {
      flex: 1;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: .92rem;
      color: #fff;
      outline: none;
      transition: border-color .2s, background .2s;
    }

    .header-search input::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    .header-search input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.12);
    }

    .header-search button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .header-search button:hover { background: #3a5ce0; }

    /* ====================================================
       LAYOUT
       ==================================================== */
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: calc(100vh - var(--header-h));
    }

    /* ====================================================
       SIDEBAR
       ==================================================== */
    .sidebar {
      position: sticky;
      top: var(--header-h);
      align-self: start;
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      padding: 36px 28px;
    }

    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 3px;
    }

    .side-empty {
      color: var(--sidebar-muted);
      font-size: .88rem;
      line-height: 1.7;
      padding: 20px 0;
    }

    .side-section + .side-section {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid var(--sidebar-border);
    }

    .side-label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--sidebar-muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .side-title {
      font-size: 1.02rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.45;
      margin-bottom: 18px;
      word-break: keep-all;
    }

    .side-meta {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-size: .88rem;
    }

    .meta-row .k {
      color: var(--sidebar-muted);
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .meta-row .v {
      color: var(--sidebar-dim);
      font-weight: 500;
      text-align: right;
      word-break: break-word;
    }

    .side-links {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--sidebar-border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .side-links a {
      display: inline-flex;
      align-items: center;
      padding: 5px 11px;
      background: rgba(74, 108, 247, 0.15);
      border-radius: 6px;
      font-size: .8rem;
      font-weight: 500;
      color: #a5b4fc;
      transition: background .15s;
    }

    .side-links a:hover {
      background: rgba(74, 108, 247, 0.28);
      text-decoration: none;
    }

    .side-links .dash {
      color: var(--sidebar-muted);
      font-size: .82rem;
    }

    /* Journal Quality */
    .q-hero {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .q-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 1.05rem;
      color: #fff;
      flex-shrink: 0;
    }

    .q-badge.q-q1 { background: var(--accent); }
    .q-badge.q-q2 { background: #6d87f7; }
    .q-badge.q-q3 { background: #f39c12; }
    .q-badge.q-q4 { background: #6b7280; }

    .q-title {
      font-weight: 600;
      font-size: .9rem;
      color: #fff;
      line-height: 1.35;
    }

    .q-sjr {
      font-size: .8rem;
      color: var(--sidebar-muted);
      margin-top: 3px;
    }

    /* ====================================================
       MAIN AREA
       ==================================================== */
    .main {
      padding: 40px 48px 80px;
      min-width: 0;
    }

    /* Candidates */
    #candidates {
      margin-bottom: 32px;
      background: #fff;
      border: 1px solid var(--main-border);
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }

    #candidates h3 {
      padding: 16px 22px;
      font-size: .9rem;
      background: #fafbfe;
      border-bottom: 1px solid var(--main-border);
    }

    .candidate-item {
      padding: 14px 22px;
      border-bottom: 1px solid #f0f2f5;
      cursor: pointer;
      transition: background .15s;
    }

    .candidate-item:last-child { border-bottom: none; }
    .candidate-item:hover { background: #f0f4ff; }

    .candidate-item .c-title {
      font-weight: 600;
      font-size: .95rem;
      line-height: 1.4;
    }

    .candidate-item .c-meta {
      font-size: .83rem;
      color: #666;
      margin-top: 4px;
    }

    /* Main Sections */
    #result { display: none; }

    .main-section + .main-section {
      margin-top: 56px;
      padding-top: 56px;
      border-top: 1px solid var(--main-border);
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 28px;
    }

    .section-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.2px;
    }

    .section-header .tag {
      font-size: .78rem;
      color: var(--main-muted);
      font-weight: 500;
    }

    /* Keywords */
    .keyword-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
    .keyword-tag {
      padding: 4px 12px;
      background: rgba(74,108,247,.1);
      color: var(--accent);
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 600;
    }

    /* Relevance banner */
    .relevance-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: .9rem;
    }
    .relevance-banner.rel-high { background: #d4f0dc; color: #1a7a3c; }
    .relevance-banner.rel-low  { background: #fde8e8; color: #c0392b; }
    .relevance-banner.rel-mid  { background: #fef3cd; color: #856404; }
    .relevance-banner .rel-label { font-weight: 800; white-space: nowrap; }

    /* Theory Analysis items */
    .analysis-item {
      border-left: 3px solid transparent;
      margin-bottom: 4px;
    }
    .analysis-item.item-problem    { border-left-color: #e74c3c; }
    .analysis-item.item-method     { border-left-color: var(--accent); }
    .analysis-item.item-conclusion { border-left-color: #27ae60; }

    .analysis-item summary {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 14px 0 14px 16px;
      cursor: pointer;
      list-style: none;
      border-top: 1px solid var(--main-border);
    }
    .analysis-item summary::-webkit-details-marker { display: none; }
    .analysis-item summary::after {
      content: '펼치기';
      margin-left: auto;
      font-size: .76rem;
      color: var(--main-muted);
      flex-shrink: 0;
    }
    .analysis-item[open] summary::after { content: '접기'; }

    .analysis-item .item-label {
      font-size: .8rem;
      font-weight: 800;
      color: #2c3544;
      white-space: nowrap;
    }
    .analysis-item .item-short {
      font-size: .92rem;
      color: #4a5568;
      line-height: 1.5;
    }
    .analysis-item .item-detail {
      padding: 0 16px 16px;
      font-size: .93rem;
      line-height: 1.75;
      color: #2c3544;
      background: #fafbfe;
      border-top: 1px dashed var(--main-border);
      margin-top: 0;
    }

    .relevance-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 700;
    }
    .rel-high { background: #d4f0dc; color: #1a7a3c; }
    .rel-low  { background: #fde8e8; color: #c0392b; }
    .rel-mid  { background: #fef3cd; color: #856404; }

    /* Authors */
    .author-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px 32px;
    }

    @media (max-width: 960px) {
      .author-grid { grid-template-columns: 1fr; }
    }

    .author-row {
      padding: 18px 0;
      border-bottom: 1px solid var(--main-border);
    }

    .author-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    .author-name {
      font-weight: 700;
      font-size: .98rem;
      color: #1a1a2e;
      line-height: 1.3;
    }

    .author-link {
      font-size: .82rem;
      flex-shrink: 0;
      white-space: nowrap;
    }

    details.papers-details { margin-top: 10px; }

    details.papers-details summary {
      cursor: pointer;
      font-size: .85rem;
      color: var(--accent);
      font-weight: 600;
      padding: 4px 0;
      list-style: none;
      user-select: none;
    }

    details.papers-details summary::-webkit-details-marker { display: none; }

    details.papers-details summary::before {
      content: '▸';
      display: inline-block;
      margin-right: 6px;
      transition: transform .15s;
    }

    details.papers-details[open] summary::before {
      transform: rotate(90deg);
    }

    .top-papers {
      list-style: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--main-border);
    }

    .top-papers li {
      font-size: .85rem;
      line-height: 1.5;
      padding: 8px 0;
      color: #333;
    }

    .top-papers li + li { border-top: 1px dashed #f0f2f5; }

    .top-papers li .cite {
      color: var(--main-muted);
      font-size: .8rem;
    }

    /* States */
    .loader {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: .95rem;
    }

    .loader::after {
      content: '';
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #dde3ec;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-left: 12px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      background: #fde8e8;
      border-radius: 10px;
      padding: 16px 20px;
      color: #c0392b;
      font-size: .92rem;
    }

    .quality-na {
      display: block;
      color: var(--sidebar-muted);
      font-size: .85rem;
      line-height: 1.7;
    }

    /* Responsive */
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        width: 100%;
      }
      .main { padding: 32px 24px 60px; }
      header { padding: 0 20px; gap: 12px; }
      .header-search { max-width: none; }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-brand">
      <span style="font-size:1.4rem;">📄</span>
      <h1>Paper Analyzer</h1>
      <span class="provider-badge provider-{{ provider }}">
        {{ "Gemini" if provider == "gemini" else "Claude" }}
      </span>
    </div>
    <div class="header-search">
      <input type="text" id="queryInput" placeholder="논문 제목 또는 URL (arXiv / DOI / ACM / IEEE 등) 입력"
        onkeydown="if(event.key==='Enter') doSearch()">
      <button onclick="doSearch()">분석</button>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar">
      <div id="sidebar-content">
        <div class="side-empty">논문을 검색하면<br>기본 정보와 저널 품질이 여기에 표시됩니다.</div>
      </div>
    </aside>

    <main class="main">
      <div id="candidates">
        <h3>🔍 검색 결과 — 분석할 논문을 선택하세요</h3>
        <div id="candidateList"></div>
      </div>
      <div id="result"></div>
    </main>

  </div>

  <script>
    async function doSearch() {
      const query = document.getElementById('queryInput').value.trim();
      if (!query) return;

      setResult('<div class="loader">검색 중</div>');
      hideCandidates();

      const fd = new FormData();
      fd.append('query', query);
      const res = await fetch('/search', { method: 'POST', body: fd });
      const data = await res.json();

      if (data.type === 'url') {
        await doAnalyzeUrl(data.query);
      } else if (data.type === 'unsupported_url') {
        setResult('<div class="error-box">URL에서 DOI / arXiv ID를 찾을 수 없습니다. 논문 제목으로 검색해주세요.</div>');
      } else if (data.type === 'candidates') {
        showCandidates(data.data);
        setResult('');
      } else if (data.error) {
        setResult(`<div class="error-box">❌ ${data.error}</div>`);
      }
    }

    function showCandidates(items) {
      const box = document.getElementById('candidates');
      const list = document.getElementById('candidateList');
      list.innerHTML = items.map(p => `
    <div class="candidate-item" onclick="doAnalyzePaperId('${p.paperId}')">
      <div class="c-title">${p.title || '(제목 없음)'}</div>
      <div class="c-meta">${p.year || '?'}년 · ${p.venue || 'venue 미상'} · 인용 ${p.citationCount ?? '?'}회</div>
    </div>
  `).join('');
      box.style.display = 'block';
    }

    function hideCandidates() {
      document.getElementById('candidates').style.display = 'none';
    }

    async function doAnalyzePaperId(paperId) {
      hideCandidates();
      setResult('<div class="loader">분석 중 (약 10~20초 소요)</div>');
      const fd = new FormData();
      fd.append('paper_id', paperId);
      const res = await fetch('/analyze', { method: 'POST', body: fd });
      const data = await res.json();
      await renderResult(data);
    }

    async function doAnalyzeUrl(url) {
      setResult('<div class="loader">분석 중 (약 10~20초 소요)</div>');
      const fd = new FormData();
      fd.append('url', url);
      const res = await fetch('/analyze', { method: 'POST', body: fd });
      const data = await res.json();
      await renderResult(data);
    }

    async function renderResult(data) {
      if (data.error) {
        setResult(`<div class="error-box">❌ 오류: ${data.error}</div>`);
        return;
      }

      const { basic, analysis, authors, quality } = data;

      // ===== Block 1: Paper Info (→ Sidebar) =====
      const doiLink = basic.doi
        ? `<a href="https://doi.org/${basic.doi}" target="_blank">DOI ↗</a>`
        : '';
      const arxivLink = basic.arxivId
        ? `<a href="https://arxiv.org/abs/${basic.arxivId}" target="_blank">arXiv ↗</a>`
        : '';
      const linksArr = [doiLink, arxivLink].filter(Boolean);
      const linksHtml = linksArr.length
        ? `<div class="side-links">${linksArr.join('')}</div>`
        : `<div class="side-links"><span class="dash">원본 링크 없음</span></div>`;

      const block1 = `
    <section class="side-section">
      <div class="side-label">📄 Paper</div>
      <div class="side-title">${esc(basic.title)}</div>
      <div class="side-meta">
        <div class="meta-row"><span class="k">Year</span><span class="v">${basic.year || '—'}</span></div>
        <div class="meta-row"><span class="k">Venue</span><span class="v">${esc(basic.venue) || '—'}</span></div>
        <div class="meta-row"><span class="k">Cited</span><span class="v">${basic.citationCount ?? '—'}회</span></div>
      </div>
      ${linksHtml}
    </section>`;

      // ===== Block 4: Journal Quality (→ Sidebar) =====
      let qualityInner;
      if (quality && quality.quartile) {
        const qKey = String(quality.quartile).trim().toLowerCase();
        const qClass = ['q1','q2','q3','q4'].includes(qKey) ? `q-${qKey}` : 'q-q4';
        qualityInner = `
        <div class="q-hero">
          <div class="q-badge ${qClass}">${esc(quality.quartile)}</div>
          <div>
            <div class="q-title">${esc(quality.matched_title) || '—'}</div>
            <div class="q-sjr">SJR ${quality.sjr ? quality.sjr.replace(',', '.') : '—'}</div>
          </div>
        </div>
        <div class="side-meta">
          <div class="meta-row"><span class="k">Type</span><span class="v">${esc(quality.type) || '—'}</span></div>
          <div class="meta-row"><span class="k">Country</span><span class="v">${esc(quality.country) || '—'}</span></div>
        </div>`;
      } else if (quality && quality.matched_title) {
        qualityInner = `<span class="quality-na">Q 등급 데이터 없음<br><strong style="color:#cdd5e0;">${esc(quality.matched_title)}</strong></span>`;
      } else {
        qualityInner = `<span class="quality-na">데이터 없음<br><code style="color:#a5b4fc;">data/scimago_if.csv</code> 파일 필요<br><a href="https://www.scimagojr.com/journalrank.php" target="_blank">Scimago 다운로드 ↗</a></span>`;
      }
      const block4 = `
    <section class="side-section">
      <div class="side-label">📊 Journal Quality</div>
      ${qualityInner}
    </section>`;

      // ===== Block 2: Theory Analysis (→ Main) =====
      const relClass = analysis.relevance === '높음' ? 'rel-high'
        : analysis.relevance === '낮음' ? 'rel-low' : 'rel-mid';
      const providerLabel = document.querySelector('.provider-badge')?.textContent?.trim() || 'AI';
      const keywordTags = (analysis.keywords || [])
        .map(k => `<span class="keyword-tag">${esc(k)}</span>`).join('');
      const block2 = `
    <section class="main-section">
      <div class="section-header">
        <h2>🧠 이론 분석</h2>
        <span class="tag">via ${providerLabel}</span>
      </div>

      ${keywordTags ? `<div class="keyword-tags">${keywordTags}</div>` : ''}

      <div class="relevance-banner ${relClass}">
        <span class="rel-label">관련성 ${esc(analysis.relevance)}</span>
        <span>${esc(analysis.relevance_reason)}</span>
      </div>

      <details class="analysis-item item-problem">
        <summary>
          <span class="item-label">문제</span>
          <span class="item-short">${esc(analysis.problem_short || analysis.problem)}</span>
        </summary>
        <div class="item-detail">${esc(analysis.problem)}</div>
      </details>
      <details class="analysis-item item-method">
        <summary>
          <span class="item-label">방법</span>
          <span class="item-short">${esc(analysis.method_short || analysis.method)}</span>
        </summary>
        <div class="item-detail">${esc(analysis.method)}</div>
      </details>
      <details class="analysis-item item-conclusion">
        <summary>
          <span class="item-label">결론</span>
          <span class="item-short">${esc(analysis.conclusion_short || analysis.conclusion)}</span>
        </summary>
        <div class="item-detail">${esc(analysis.conclusion)}</div>
      </details>
    </section>`;

      // ===== Block 3: Authors (→ Main) =====
      const currentTitle = basic.title.toLowerCase();
      const authorCardsHTML = (authors || []).map(a => {
        const topPapers = (a.topPapers || []).map(p => {
          const isCurrentPaper = p.title && p.title.toLowerCase() === currentTitle;
          const titleHtml = isCurrentPaper
            ? `<strong style="color:#4a6cf7;">${esc(p.title)} ★</strong>`
            : esc(p.title);
          return `<li>${titleHtml} <span class="cite">· 인용 ${p.citationCount ?? '?'}회</span></li>`;
        }).join('');
        const s2Link = a.authorId
          ? `<a class="author-link" href="https://www.semanticscholar.org/author/${a.authorId}" target="_blank">프로필 ↗</a>`
          : '';
        const papersCount = (a.topPapers || []).length;
        const papersSection = topPapers
          ? `<details class="papers-details">
               <summary>대표 논문 ${papersCount}편 보기</summary>
               <ul class="top-papers">${topPapers}</ul>
             </details>`
          : `<span style="color:#8a95a8;font-size:.82rem;display:block;margin-top:6px;">대표 논문 없음</span>`;
        const metaParts = [];
        if (a.hIndex != null)       metaParts.push(`h-index ${a.hIndex}`);
        if (a.citationCount != null) metaParts.push(`인용 ${a.citationCount.toLocaleString()}회`);
        const metaLine = metaParts.length
          ? `<div style="font-size:.8rem;color:#8a95a8;margin:3px 0 6px;">${metaParts.join(' · ')}</div>`
          : '';
        return `
      <div class="author-row">
        <div class="author-head">
          <div class="author-name">${esc(a.name)}</div>
          ${s2Link}
        </div>
        ${metaLine}
        ${papersSection}
      </div>`;
      }).join('');

      const authorsBody = authorCardsHTML
        ? `<div class="author-grid">${authorCardsHTML}</div>`
        : '<span style="color:#8a95a8;font-size:.9rem;">저자 정보 없음</span>';

      const block3 = `
    <section class="main-section">
      <div class="section-header">
        <h2>👤 저자 정보</h2>
      </div>
      ${authorsBody}
    </section>`;

      // ===== Dispatch: sidebar ← block1+block4, main ← block2+block3 =====
      document.getElementById('sidebar-content').innerHTML = block1 + block4;
      setResult(block2 + block3);
    }

    function setResult(html) {
      const el = document.getElementById('result');
      el.innerHTML = html;
      el.style.display = html ? 'block' : 'none';
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
  <script>
    document.getElementById('queryInput').focus();
  </script>
</body>

</html>
