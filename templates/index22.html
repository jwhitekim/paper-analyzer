<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Analyzer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f6f9;
      color: #222;
      line-height: 1.6;
    }

    /* ====== Header ====== */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .provider-badge {
      margin-left: auto;
      font-size: .78rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .provider-gemini { background: #1e7e34; color: #fff; }
    .provider-claude { background: #d97706; color: #fff; }

    /* ====== Container ====== */
    .container {
      max-width: 1100px;
      margin: 48px auto;
      padding: 0 32px;
    }

    /* ====== Search Box ====== */
    .search-box {
      background: #fff;
      border-radius: 14px;
      padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
      display: flex;
      gap: 12px;
    }

    .search-box input {
      flex: 1;
      border: 1.5px solid #dde3ec;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .search-box input:focus {
      border-color: #4a6cf7;
      box-shadow: 0 0 0 3px rgba(74, 108, 247, .15);
    }

    .search-box button {
      background: #4a6cf7;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .search-box button:hover { background: #3a5ce0; }
    .search-box button:active { transform: scale(.98); }

    /* ====== Candidates ====== */
    #candidates {
      margin-top: 20px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
      overflow: hidden;
      display: none;
    }

    #candidates h3 {
      padding: 18px 24px;
      font-size: .95rem;
      background: #f8f9fc;
      border-bottom: 1px solid #eef1f5;
    }

    .candidate-item {
      padding: 16px 24px;
      border-bottom: 1px solid #f0f2f5;
      cursor: pointer;
      transition: background .15s;
    }

    .candidate-item:last-child { border-bottom: none; }
    .candidate-item:hover { background: #f0f4ff; }

    .candidate-item .c-title {
      font-weight: 600;
      font-size: .98rem;
      line-height: 1.4;
    }

    .candidate-item .c-meta {
      font-size: .85rem;
      color: #666;
      margin-top: 5px;
    }

    /* ====== Result Layout ====== */
    #result {
      margin-top: 40px;
      display: none;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    @media (max-width: 820px) {
      .top-grid { grid-template-columns: 1fr; }
    }

    /* ====== Block ====== */
    .block {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .06);
      margin-bottom: 24px;
      overflow: hidden;
    }

    .block:last-child { margin-bottom: 0; }
    .top-grid .block { margin-bottom: 0; }

    .block-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      background: #fafbfe;
      border-bottom: 1px solid #eef1f5;
      font-weight: 700;
      font-size: 1rem;
    }

    .block-header .icon {
      font-size: 1.3rem;
    }

    .block-header .tag {
      margin-left: auto;
      font-size: .78rem;
      font-weight: 500;
      color: #8a95a8;
    }

    .block-body {
      padding: 26px 28px;
    }

    /* ====== Block 1: Paper Info ====== */
    .paper-title {
      font-size: 1.08rem;
      font-weight: 700;
      line-height: 1.45;
      color: #1a1a2e;
      margin-bottom: 16px;
    }

    .paper-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      font-size: .9rem;
      margin-bottom: 18px;
    }

    .paper-meta .item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .paper-meta .label {
      color: #8a95a8;
      font-size: .82rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .paper-meta .value {
      color: #333;
      font-weight: 600;
    }

    .paper-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid #f0f2f5;
    }

    .paper-links a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: #f0f4ff;
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 500;
      color: #4a6cf7;
      transition: background .15s;
    }

    .paper-links a:hover {
      background: #e0e8ff;
      text-decoration: none;
    }

    .paper-links .dash {
      color: #8a95a8;
      font-size: .85rem;
      padding: 6px 0;
    }

    /* ====== Block 2: Theory Analysis (Cards) ====== */
    .theory-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 720px) {
      .theory-grid { grid-template-columns: 1fr; }
    }

    .theory-card {
      background: #fafbfe;
      border-radius: 10px;
      padding: 20px 22px;
      border-left: 3px solid #4a6cf7;
    }

    .theory-card.card-problem    { border-left-color: #e74c3c; }
    .theory-card.card-method     { border-left-color: #4a6cf7; }
    .theory-card.card-conclusion { border-left-color: #27ae60; }
    .theory-card.card-relevance  { border-left-color: #f39c12; }

    .theory-card .card-label {
      font-size: .78rem;
      font-weight: 700;
      color: #5a6578;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .theory-card .card-content {
      font-size: .94rem;
      line-height: 1.65;
      color: #222;
    }

    .theory-card .badge-row {
      margin-bottom: 10px;
    }

    /* Relevance Badge */
    .relevance-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: .82rem;
      font-weight: 700;
    }

    .rel-high { background: #d4f0dc; color: #1a7a3c; }
    .rel-low  { background: #fde8e8; color: #c0392b; }
    .rel-mid  { background: #fef3cd; color: #856404; }

    /* ====== Block 3: Authors ====== */
    .author-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 720px) {
      .author-grid { grid-template-columns: 1fr; }
    }

    .author-card {
      border: 1px solid #eaeef3;
      border-radius: 10px;
      padding: 18px 20px;
      transition: border-color .2s, box-shadow .2s;
    }

    .author-card:hover {
      border-color: #cfd8e3;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .04);
    }

    .author-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    .author-name {
      font-weight: 700;
      font-size: .98rem;
      color: #1a1a2e;
      line-height: 1.3;
    }

    .author-link {
      font-size: .82rem;
      flex-shrink: 0;
      white-space: nowrap;
    }

    details.papers-details {
      margin-top: 10px;
    }

    details.papers-details summary {
      cursor: pointer;
      font-size: .85rem;
      color: #4a6cf7;
      font-weight: 600;
      padding: 6px 0;
      list-style: none;
      user-select: none;
    }

    details.papers-details summary::-webkit-details-marker { display: none; }

    details.papers-details summary::before {
      content: '▸';
      display: inline-block;
      margin-right: 6px;
      transition: transform .15s;
    }

    details.papers-details[open] summary::before {
      transform: rotate(90deg);
    }

    .top-papers {
      list-style: none;
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid #f0f2f5;
    }

    .top-papers li {
      font-size: .85rem;
      line-height: 1.5;
      padding: 7px 0;
      color: #333;
    }

    .top-papers li + li {
      border-top: 1px dashed #f0f2f5;
    }

    .top-papers li .cite {
      color: #8a95a8;
      font-size: .8rem;
    }

    /* ====== Block 4: Journal Quality ====== */
    .quality-hero {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid #f0f2f5;
    }

    .q-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1.15rem;
      color: #fff;
      flex-shrink: 0;
    }

    .q-badge.q-q1 { background: #1e7e34; }
    .q-badge.q-q2 { background: #4a6cf7; }
    .q-badge.q-q3 { background: #f39c12; }
    .q-badge.q-q4 { background: #95a5a6; }

    .q-title {
      font-weight: 700;
      font-size: .98rem;
      color: #1a1a2e;
      line-height: 1.4;
    }

    .q-sjr {
      font-size: .85rem;
      color: #666;
      margin-top: 4px;
    }

    .q-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 18px;
      font-size: .88rem;
    }

    .q-meta .row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .q-meta .label {
      color: #8a95a8;
      font-size: .76rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .q-meta .value {
      color: #222;
      font-weight: 600;
    }

    .quality-na {
      display: block;
      color: #8a95a8;
      font-size: .9rem;
      line-height: 1.7;
    }

    /* ====== Loader / Error ====== */
    .loader {
      text-align: center;
      padding: 50px;
      color: #888;
      font-size: .95rem;
    }

    .loader::after {
      content: '';
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #dde3ec;
      border-top-color: #4a6cf7;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-left: 12px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      background: #fde8e8;
      border-radius: 10px;
      padding: 16px 20px;
      color: #c0392b;
      font-size: .92rem;
    }

    a {
      color: #4a6cf7;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>

<body>

  <header>
    <span style="font-size:1.5rem;">📄</span>
    <h1>Paper Analyzer</h1>
    <span class="provider-badge provider-{{ provider }}">
      {{ "Gemini" if provider == "gemini" else "Claude" }}
    </span>
  </header>

  <div class="container">
    <div class="search-box">
      <input type="text" id="queryInput" placeholder="논문 제목 또는 URL (arXiv / DOI / ACM / IEEE 등) 입력"
        onkeydown="if(event.key==='Enter') doSearch()">
      <button onclick="doSearch()">분석</button>
    </div>

    <div id="candidates">
      <h3>🔍 검색 결과 — 분석할 논문을 선택하세요</h3>
      <div id="candidateList"></div>
    </div>

    <div id="result"></div>
  </div>

  <script>
    async function doSearch() {
      const query = document.getElementById('queryInput').value.trim();
      if (!query) return;

      setResult('<div class="loader">검색 중</div>');
      hideCandidates();

      const fd = new FormData();
      fd.append('query', query);
      const res = await fetch('/search', { method: 'POST', body: fd });
      const data = await res.json();

      if (data.type === 'url') {
        await doAnalyzeUrl(data.query);
      } else if (data.type === 'unsupported_url') {
        setResult('<div class="error-box">URL에서 DOI / arXiv ID를 찾을 수 없습니다. 논문 제목으로 검색해주세요.</div>');
      } else if (data.type === 'candidates') {
        showCandidates(data.data);
        setResult('');
      } else if (data.error) {
        setResult(`<div class="error-box">❌ ${data.error}</div>`);
      }
    }

    function showCandidates(items) {
      const box = document.getElementById('candidates');
      const list = document.getElementById('candidateList');
      list.innerHTML = items.map(p => `
    <div class="candidate-item" onclick="doAnalyzePaperId('${p.paperId}')">
      <div class="c-title">${p.title || '(제목 없음)'}</div>
      <div class="c-meta">${p.year || '?'}년 · ${p.venue || 'venue 미상'} · 인용 ${p.citationCount ?? '?'}회</div>
    </div>
  `).join('');
      box.style.display = 'block';
    }

    function hideCandidates() {
      document.getElementById('candidates').style.display = 'none';
    }

    async function doAnalyzePaperId(paperId) {
      hideCandidates();
      setResult('<div class="loader">분석 중 (약 10~20초 소요)</div>');
      const fd = new FormData();
      fd.append('paper_id', paperId);
      const res = await fetch('/analyze', { method: 'POST', body: fd });
      const data = await res.json();
      await renderResult(data);
    }

    async function doAnalyzeUrl(url) {
      setResult('<div class="loader">분석 중 (약 10~20초 소요)</div>');
      const fd = new FormData();
      fd.append('url', url);
      const res = await fetch('/analyze', { method: 'POST', body: fd });
      const data = await res.json();
      await renderResult(data);
    }

    async function renderResult(data) {
      if (data.error) {
        setResult(`<div class="error-box">❌ 오류: ${data.error}</div>`);
        return;
      }

      const { basic, analysis, authors, quality } = data;

      // ===== Block 1: Paper Info =====
      const doiLink = basic.doi
        ? `<a href="https://doi.org/${basic.doi}" target="_blank">DOI ↗</a>`
        : '';
      const arxivLink = basic.arxivId
        ? `<a href="https://arxiv.org/abs/${basic.arxivId}" target="_blank">arXiv:${basic.arxivId} ↗</a>`
        : '';
      const linksArr = [doiLink, arxivLink].filter(Boolean);
      const linksHtml = linksArr.length
        ? `<div class="paper-links">${linksArr.join('')}</div>`
        : `<div class="paper-links"><span class="dash">원본 링크 없음</span></div>`;

      const block1 = `
    <div class="block">
      <div class="block-header"><span class="icon">📄</span>논문 정보</div>
      <div class="block-body">
        <div class="paper-title">${esc(basic.title)}</div>
        <div class="paper-meta">
          <div class="item"><span class="label">Year</span><span class="value">${basic.year || '?'}</span></div>
          <div class="item"><span class="label">Venue</span><span class="value">${esc(basic.venue) || '—'}</span></div>
          <div class="item"><span class="label">Cited</span><span class="value">${basic.citationCount ?? '—'}회</span></div>
        </div>
        ${linksHtml}
      </div>
    </div>`;

      // ===== Block 2: Theory Analysis =====
      const relClass = analysis.relevance === '높음' ? 'rel-high'
        : analysis.relevance === '낮음' ? 'rel-low' : 'rel-mid';
      const providerLabel = document.querySelector('.provider-badge')?.textContent?.trim() || 'AI';
      const block2 = `
    <div class="block">
      <div class="block-header">
        <span class="icon">🧠</span>이론 분석
        <span class="tag">via ${providerLabel}</span>
      </div>
      <div class="block-body">
        <div class="theory-grid">
          <div class="theory-card card-problem">
            <div class="card-label">해결하려는 문제</div>
            <div class="card-content">${esc(analysis.problem)}</div>
          </div>
          <div class="theory-card card-method">
            <div class="card-label">제안 방법</div>
            <div class="card-content">${esc(analysis.method)}</div>
          </div>
          <div class="theory-card card-conclusion">
            <div class="card-label">주요 결론</div>
            <div class="card-content">${esc(analysis.conclusion)}</div>
          </div>
          <div class="theory-card card-relevance">
            <div class="card-label">관련성</div>
            <div class="badge-row"><span class="relevance-badge ${relClass}">${esc(analysis.relevance)}</span></div>
            <div class="card-content">${esc(analysis.relevance_reason)}</div>
          </div>
        </div>
      </div>
    </div>`;

      // ===== Block 3: Authors =====
      const currentTitle = basic.title.toLowerCase();
      const authorCardsHTML = (authors || []).map(a => {
        const topPapers = (a.topPapers || []).map(p => {
          const isCurrentPaper = p.title && p.title.toLowerCase() === currentTitle;
          const titleHtml = isCurrentPaper
            ? `<strong style="color:#4a6cf7;">${esc(p.title)} ★</strong>`
            : esc(p.title);
          return `<li>${titleHtml} <span class="cite">· 인용 ${p.citationCount ?? '?'}회</span></li>`;
        }).join('');
        const s2Link = a.authorId
          ? `<a class="author-link" href="https://www.semanticscholar.org/author/${a.authorId}" target="_blank">프로필 ↗</a>`
          : '';
        const papersCount = (a.topPapers || []).length;
        const papersSection = topPapers
          ? `<details class="papers-details">
               <summary>대표 논문 ${papersCount}편 보기</summary>
               <ul class="top-papers">${topPapers}</ul>
             </details>`
          : `<span class="quality-na" style="font-size:.82rem;margin-top:8px;">대표 논문 없음</span>`;
        return `
      <div class="author-card">
        <div class="author-header">
          <div class="author-name">${esc(a.name)}</div>
          ${s2Link}
        </div>
        ${papersSection}
      </div>`;
      }).join('');

      const block3Body = authorCardsHTML
        ? `<div class="author-grid">${authorCardsHTML}</div>`
        : '<span class="quality-na">저자 정보 없음</span>';

      const block3 = `
    <div class="block">
      <div class="block-header"><span class="icon">👤</span>저자 정보</div>
      <div class="block-body">${block3Body}</div>
    </div>`;

      // ===== Block 4: Journal Quality =====
      let block4Body;
      if (quality && quality.quartile) {
        const qKey = String(quality.quartile).trim().toLowerCase();
        const qClass = ['q1','q2','q3','q4'].includes(qKey) ? `q-${qKey}` : 'q-q4';
        block4Body = `
      <div class="quality-hero">
        <div class="q-badge ${qClass}">${esc(quality.quartile)}</div>
        <div>
          <div class="q-title">${esc(quality.matched_title) || '—'}</div>
          <div class="q-sjr">SJR ${quality.sjr ? quality.sjr.replace(',', '.') : '—'}</div>
        </div>
      </div>
      <div class="q-meta">
        <div class="row">
          <span class="label">Type</span>
          <span class="value">${esc(quality.type) || '—'}</span>
        </div>
        <div class="row">
          <span class="label">Country</span>
          <span class="value">${esc(quality.country) || '—'}</span>
        </div>
      </div>`;
      } else if (quality && quality.matched_title) {
        block4Body = `<span class="quality-na">저널을 찾았으나 Q 등급 데이터가 없습니다.<br><strong>${esc(quality.matched_title)}</strong></span>`;
      } else {
        block4Body = `<span class="quality-na">데이터 없음 — <code>data/scimago_if.csv</code> 파일을 넣어주세요.<br><a href="https://www.scimagojr.com/journalrank.php" target="_blank">Scimago 다운로드 ↗</a></span>`;
      }
      const block4 = `
    <div class="block">
      <div class="block-header"><span class="icon">📊</span>저널/컨퍼런스 품질</div>
      <div class="block-body">${block4Body}</div>
    </div>`;

      // ===== Final Layout =====
      setResult(`<div class="top-grid">${block1}${block4}</div>${block2}${block3}`);
    }

    function setResult(html) {
      const el = document.getElementById('result');
      el.innerHTML = html;
      el.style.display = html ? 'block' : 'none';
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
  <script>
    document.getElementById('queryInput').focus();
  </script>
</body>

</html>
